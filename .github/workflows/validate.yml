name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate dictionaries and generate rules
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Check for duplicate or conflicting words
        run: python3 generate_espanso.py --check

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt --quiet

      - name: Run test suite
        run: pytest tests/ -v

      - name: Generate YAML files (dry run to a temp dir)
        run: python3 generate_espanso.py --output-dir /tmp/refuos-out

      - name: Verify generated YAML is parseable
        run: |
          python3 - <<'EOF'
          import yaml, os, sys

          out_dir = "/tmp/refuos-out"
          files = [f for f in os.listdir(out_dir) if f.endswith(".yml")]
          if not files:
              print("ERROR: no YAML files were generated")
              sys.exit(1)

          errors = []
          for fname in sorted(files):
              path = os.path.join(out_dir, fname)
              try:
                  with open(path, encoding="utf-8") as f:
                      yaml.safe_load(f)
                  print(f"  ok  {fname}")
              except yaml.YAMLError as e:
                  errors.append(f"  FAIL  {fname}: {e}")

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          EOF

      - name: Print rule counts
        run: |
          python3 - <<'EOF'
          import yaml, os

          out_dir = "/tmp/refuos-out"
          total = 0
          for fname in sorted(os.listdir(out_dir)):
              if not fname.endswith(".yml"):
                  continue
              with open(os.path.join(out_dir, fname), encoding="utf-8") as f:
                  data = yaml.safe_load(f)
              count = len(data.get("matches", []))
              total += count
              print(f"  {fname:<28} {count:>5,} rules")
          print(f"\n  Total: {total:,} rules")
          EOF
