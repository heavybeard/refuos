name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Validate dictionaries
        run: python3 generate_espanso.py --check

      - name: Generate YAML rules
        run: python3 generate_espanso.py --output-dir build/

      - name: Verify generated YAML is parseable
        run: |
          pip install 'pyyaml==6.*' --quiet
          python3 - <<'EOF'
          import yaml, os, sys
          errors = []
          for fname in sorted(os.listdir("build")):
              if not fname.endswith(".yml"):
                  continue
              with open(f"build/{fname}", encoding="utf-8") as f:
                  try:
                      yaml.safe_load(f)
                      print(f"  ok  {fname}")
                  except yaml.YAMLError as e:
                      errors.append(f"  FAIL  {fname}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          EOF

      - name: Generate checksums
        run: cd build && sha256sum refuos-*.yml > checksums.sha256

      - name: Create ZIP bundle
        run: |
          cd build
          zip ../refuos-rules.zip refuos-*.yml

      - name: Generate Espanso Hub packages
        run: python3 generate_espanso.py --espanso-packages espanso-packages/

      - name: Publish package branches (pkg/*)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # git clean -fdx inside the loop removes all untracked files, including
          # espanso-packages/, build/ and refuos-rules.zip, which are needed both
          # between iterations and by the steps that follow. Save everything first
          # and restore afterward.
          saved_tmp=$(mktemp -d)
          cp -r espanso-packages/. "$saved_tmp/espanso-packages/"
          cp -r build/.             "$saved_tmp/build/"
          cp refuos-rules.zip       "$saved_tmp/"
          ORIG_HEAD=$(git rev-parse HEAD)
          for pkg in refuos-italiano refuos-accenti refuos-dev; do
            branch="pkg/$pkg"
            tmpdir=$(mktemp -d)
            cp -r "$saved_tmp/espanso-packages/$pkg/." "$tmpdir/"
            git checkout --orphan "$branch"
            git rm -rf . --quiet
            git clean -fdx --quiet
            cp -r "$tmpdir/." .
            rm -rf "$tmpdir"
            git add -A
            git commit -m "chore: update packages for ${{ github.ref_name }}"
            git push origin "HEAD:$branch" --force
            git checkout "$ORIG_HEAD" --quiet
            git branch -D "$branch" 2>/dev/null || true
          done
          cp -r "$saved_tmp/espanso-packages/." espanso-packages/
          cp -r "$saved_tmp/build/."            build/
          cp    "$saved_tmp/refuos-rules.zip"   .
          rm -rf "$saved_tmp"

      - name: Print rule counts
        run: |
          python3 - <<'EOF'
          import yaml, os
          total = 0
          for fname in sorted(os.listdir("build")):
              if not fname.endswith(".yml"):
                  continue
              with open(f"build/{fname}", encoding="utf-8") as f:
                  data = yaml.safe_load(f)
              count = len(data.get("matches", []))
              total += count
              print(f"  {fname:<30} {count:>5,} rules")
          print(f"\n  Total: {total:,} rules")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            refuos-rules.zip
            build/refuos-italiano.yml
            build/refuos-accenti.yml
            build/refuos-dev.yml
            build/checksums.sha256
