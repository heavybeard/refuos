name: "Feature request"
description: "Suggest an idea for Refuos."
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
      description: "Describe the situation where you felt something was missing or could be better."
      placeholder: "I'm frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: "How would you like it to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives you've considered"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "Additional context"
    validations:
      required: false
