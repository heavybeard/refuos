name: "Add a word"
description: "Propose a new word to add to one of the existing dictionaries."
title: "add: <word>"
labels: ["new-word"]
body:
  - type: input
    id: word
    attributes:
      label: "Word"
      description: "The word you want to add (lowercase)."
      placeholder: "es. comunque"
    validations:
      required: true

  - type: dropdown
    id: pack
    attributes:
      label: "Dictionary"
      description: "Which dictionary should this word go into?"
      options:
        - "italiano — everyday Italian words"
        - "accenti — accented words, future-tense verbs, -ita nouns"
        - "dev — tech and code terms"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Context (optional)"
      description: "Why this word? Any edge cases or variants we should know about?"
      placeholder: "e.g. 'This word is commonly mistyped because ...'"
    validations:
      required: false
